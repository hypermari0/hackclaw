<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet" role="img" aria-label="HackClaw">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#1A1A22"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5560"/>
      <stop offset="100%" stop-color="#FF3B47"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1F1F28" stroke-width="1">
    <path d="M0 128 H512 M0 256 H512 M0 384 H512 M128 0 V512 M256 0 V512 M384 0 V512" opacity="0.6"/>
  </g>

  <!-- left bracket -->
  <path d="M152 128 L96 128 L96 384 L152 384"
        fill="none" stroke="#F4F4F0" stroke-width="22" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- right bracket -->
  <path d="M360 128 L416 128 L416 384 L360 384"
        fill="none" stroke="#F4F4F0" stroke-width="22" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- three claw slashes between the brackets -->
  <g filter="url(#glow)" stroke="url(#claw)" stroke-linecap="round" stroke-width="28">
    <line x1="180" y1="120" x2="300" y2="280"/>
    <line x1="220" y1="140" x2="332" y2="296"/>
    <line x1="258" y1="158" x2="364" y2="312"/>
  </g>

  <!-- mint terminal accent dot -->
  <circle cx="416" cy="384" r="10" fill="#00F0B5"/>
</svg>

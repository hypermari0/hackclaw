<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" role="img" aria-label="HackClaw cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0F"/>
      <stop offset="100%" stop-color="#15151D"/>
    </linearGradient>
    <linearGradient id="claw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5560"/>
      <stop offset="100%" stop-color="#FF3B47"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>

  <!-- grid -->
  <g stroke="#1F1F28" stroke-width="1" opacity="0.7">
    <path d="M0 100 H1500 M0 200 H1500 M0 300 H1500 M0 400 H1500"/>
    <path d="M100 0 V500 M200 0 V500 M300 0 V500 M400 0 V500 M500 0 V500 M600 0 V500 M700 0 V500 M800 0 V500 M900 0 V500 M1000 0 V500 M1100 0 V500 M1200 0 V500 M1300 0 V500 M1400 0 V500"/>
  </g>

  <!-- six squad nodes connected (subtle, background) -->
  <g stroke="#262631" stroke-width="2" fill="none">
    <circle cx="900" cy="120" r="22"/>
    <circle cx="1080" cy="180" r="22"/>
    <circle cx="1080" cy="320" r="22"/>
    <circle cx="900" cy="380" r="22"/>
    <circle cx="720" cy="320" r="22"/>
    <circle cx="720" cy="180" r="22"/>
    <line x1="900" y1="120" x2="1080" y2="180"/>
    <line x1="1080" y1="180" x2="1080" y2="320"/>
    <line x1="1080" y1="320" x2="900" y2="380"/>
    <line x1="900" y1="380" x2="720" y2="320"/>
    <line x1="720" y1="320" x2="720" y2="180"/>
    <line x1="720" y1="180" x2="900" y2="120"/>
    <line x1="900" y1="120" x2="900" y2="380"/>
    <line x1="720" y1="180" x2="1080" y2="320"/>
    <line x1="1080" y1="180" x2="720" y2="320"/>
  </g>

  <!-- left logo block: brackets + claws -->
  <g transform="translate(80,110)">
    <!-- left bracket -->
    <path d="M84 0 L36 0 L36 280 L84 280"
          fill="none" stroke="#F4F4F0" stroke-width="20" stroke-linecap="square"/>
    <!-- right bracket -->
    <path d="M236 0 L284 0 L284 280 L236 280"
          fill="none" stroke="#F4F4F0" stroke-width="20" stroke-linecap="square"/>
    <!-- three claw slashes -->
    <g filter="url(#glow)" stroke="url(#claw)" stroke-linecap="round" stroke-width="26">
      <line x1="100" y1="-10" x2="220" y2="160"/>
      <line x1="140" y1="10" x2="252" y2="180"/>
      <line x1="178" y1="30" x2="282" y2="200"/>
    </g>
    <!-- mint dot -->
    <circle cx="284" cy="280" r="9" fill="#00F0B5"/>
  </g>

  <!-- wordmark + tagline -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
    <text x="430" y="220" font-size="86" font-weight="800" letter-spacing="6" fill="#F4F4F0">HACKCLAW</text>
    <text x="432" y="278" font-size="22" font-weight="500" letter-spacing="2" fill="#9A9AA6">
      AI squads that claw their way to hackathon wins.
    </text>
    <g font-size="18" font-weight="500" letter-spacing="3" fill="#FF3B47">
      <text x="432" y="334">[ STRATEGIST ]  [ PM ]  [ DEV ]  [ DESIGNER ]  [ STORYTELLER ]  [ SUBMITTER ]</text>
    </g>
    <text x="432" y="380" font-size="16" font-weight="500" letter-spacing="2" fill="#00F0B5">
      A HERMES AGENT PLUGIN PACK
    </text>
  </g>
</svg>
